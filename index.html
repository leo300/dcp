<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discount PRO App</title>
<link rel="manifest" href="manifest.json">
<style>
:root { --bg:#f5f6f8; --card:white; --text:black; --res:green; }
.dark { --bg:#121212; --card:#1e1e1e; --text:white; --res:#00e676; }
body{ margin:0; font-family:Arial; background:var(--bg); color:var(--text); display:flex; justify-content:center; align-items:center; height:100vh; }
.card{ width:90%;  max-width:420px; background:var(--card); padding:20px; border-radius:20px; box-sizing: border-box; }
input, select{ width:100%; padding:14px; margin:8px 0; font-size:16px; box-sizing: border-box; }
.result{ font-size:30px; text-align:center; margin-top:15px; color:var(--res); }
.footer { text-align: center;  margin-top: 20px; font-size: 12px; color: #888; }
</style>
</head>
<body>
<div class="card">
<h2>Discount PRO</h2>
<input id="price" type="number" min="0" placeholder="Price">
<input id="discount" type="number" min="0" max="100" placeholder="Discount %">
<select id="currency">
<option>NOK</option><option>EUR</option><option>USD</option>
</select>
<div class="result" id="result">0</div>
<div class="footer">
  &copy; <span id="currentYear"></span> Discount PRO App - LM
</div>
</div>
<script>
function calc(){
  let p = parseFloat(price.value) || 0;
  let d = parseFloat(discount.value) || 0;
  let c = currency.value;
  p = Math.max(0, p);
  d = Math.max(0, Math.min(100, d));
  let f = p * (1 - d / 100);
  result.innerText = f.toFixed(2) + " " + c;
}
price.oninput=calc;
discount.oninput=calc;
currency.onchange=calc;
document.getElementById('currentYear').textContent = new Date().getFullYear();
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('service-worker.js');
}
</script>
</body>
</html>
